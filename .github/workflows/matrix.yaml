name: usin-matrix
on:
    push

jobs:
  hello:
    
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node-version:
          - 20
          - 22

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node-version}}
      - run: node --version
        